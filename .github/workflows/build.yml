name: Build My App
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Extract Files
        run: |
          # فك ضغط أي ملف zip موجود في المستودع
          unzip -o *.zip -d .
          # التأكد من أن الملفات في المكان الصحيح (السطر ده بيطلع كل الملفات عشان نتأكد)
          ls -R

      - name: Install and Build Project
        run: |
          # التأكد من وجود ملف package.json قبل البدء
          if [ -f "package.json" ]; then
            npm install --legacy-peer-deps
            npm run build
            npx cap add android || echo "Android already added"
            npx cap sync android
          else
            echo "Error: package.json missing! Check your zip file."
            exit 1
          fi

      - name: Build Android APK
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Error: Android folder not generated!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mohamed-APK
          path: "android/app/build/outputs/apk/debug/*.apk"
          
